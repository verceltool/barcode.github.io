            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .toggle.active::after {
            transform: translateX(20px);

        /* Schema.org for SEO */

        /* Responsive */

        /* Animation */

    </style>
</head>

    <script>
        // State
        let generatedData = [];
        let settings = {
            type: 'code128',
            width: 2,
            height: 100,
            showText: true,
            margin: 10
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initDragDrop();
        });

        // Tab switching
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabName = btn.dataset.tab;
                    const parentSection = btn.closest('.card') || btn.closest('section');

                    // Remove active from all tabs in same section
                    parentSection.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    parentSection.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                    // Add active to clicked tab and content
                    btn.classList.add('active');
                    parentSection.querySelector(`#tab-${tabName}`).classList.add('active');
                });
            });
        }

        // Drag and drop for Excel
        function initDragDrop() {
            const dropZone = document.getElementById('dropZone');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    processExcelFile(files[0]);
                }
            });

            // Click to upload
            dropZone.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    document.getElementById('excelInput').click();
                }
            });
        }

        // Handle Excel file
        function handleExcelFile(event) {
            const file = event.target.files[0];
            if (file) {
                processExcelFile(file);
            }
        }

        // Process Excel file
        function processExcelFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                    // Extract first column as data
                    const values = jsonData
                        .map(row => row[0])
                        .filter(val => val !== undefined && val !== null && val !== '');

                    generateBatch(values);
                } catch (error) {
                    alert('文件解析失败，请检查文件格式');
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Generate from text input
        function generateFromText() {
            const text = document.getElementById('textInput').value;
            const values = text.split('\n')
                .map(v => v.trim())
                .filter(v => v.length > 0);

            if (values.length === 0) {
                alert('请输入至少一条数据');
                return;
            }

            generateBatch(values);
        }

        // Add single item
        function addSingle() {
            const value = document.getElementById('singleInput').value.trim();
            if (!value) {
                alert('请输入数据');
                return;
            }

            generatedData.push({
                value: value,
                id: Date.now()
            });

            document.getElementById('singleInput').value = '';
            renderResults();
        }

        // Generate batch
        function generateBatch(values) {
            values.forEach(value => {
                // Check if already exists
                const exists = generatedData.some(item => item.value === value);
                if (!exists) {
                    generatedData.push({
                        value: value,
                        id: Date.now() + Math.random()
                    });
                }
            });

            renderResults();
        }

        // Update settings
        function updateSettings() {
            settings.type = document.getElementById('codeType').value;
            settings.width = parseInt(document.getElementById('widthInput').value) || 2;
            settings.height = parseInt(document.getElementById('heightInput').value) || 100;
            settings.margin = parseInt(document.getElementById('marginInput').value) || 10;

            // QR code doesn't have width/height like barcodes
            const marginGroup = document.getElementById('marginGroup');
            if (settings.type === 'qr') {
                marginGroup.style.display = 'none';
            } else {
                marginGroup.style.display = 'block';
            }

            // Re-render with new settings
            renderResults();
        }

        // Toggle show text
        function toggleShowText() {
            settings.showText = !settings.showText;
            document.getElementById('showTextToggle').classList.toggle('active', settings.showText);
            renderResults();
        }

        // Render results
        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            const countEl = document.getElementById('resultCount');

            countEl.textContent = generatedData.length;

            if (generatedData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>输入数据后点击生成按钮<br>条形码/二维码将在这里显示</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = generatedData.map((item, index) => {
                const elementId = `code-${item.id}`;
                return `
                    <div class="result-item">
                        <div class="result-code" id="${elementId}"></div>
                        <div class="result-value">${item.value}</div>
                    </div>
                `;
            }).join('');

            // Generate each code
            generatedData.forEach(item => {
                const elementId = `code-${item.id}`;
                const element = document.getElementById(elementId);

                if (settings.type === 'qr') {
                    generateQRCode(element, item.value);
                } else {
                    generateBarcode(element, item.value);
                }
            });
        }

        // Generate barcode
        function generateBarcode(element, value) {
            element.innerHTML = '';
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            element.appendChild(svg);

            try {
                JsBarcode(svg, value, {
                    format: settings.type.toUpperCase(),
                    width: settings.width,
                    height: settings.height,
                    displayValue: settings.showText,
                    margin: settings.margin,
                    lineColor: '#000000'
                });
            } catch (error) {
                element.innerHTML = `<span style="color: #ef4444; font-size: 0.8rem;">格式错误</span>`;
            }
        }

        // Generate QR code
        function generateQRCode(element, value) {
            element.innerHTML = '';
            new QRCode(element, {
                text: value,
                width: settings.height,
                height: settings.height,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Clear results
        function clearResults() {
            if (generatedData.length > 0) {
                if (confirm('确定要清空所有生成的条形码/二维码吗？')) {
                    generatedData = [];
                    renderResults();
                }
            }
        }

        // Download as ZIP
        async function downloadZip() {
            if (generatedData.length === 0) {
                alert('没有可下载的内容');
                return;
            }

            const zip = new JSZip();
            const imagesFolder = zip.folder('barcodes');

            for (let i = 0; i < generatedData.length; i++) {
                const item = generatedData[i];
                const elementId = `code-${item.id}`;
                const element = document.getElementById(elementId);

                let imageData;

                if (settings.type === 'qr') {
                    // QR code canvas
                    const canvas = element.querySelector('canvas');
                    if (canvas) {
                        imageData = canvas.toDataURL('image/png').split(',')[1];
                    }
                } else {
                    // Barcode SVG to PNG
                    const svg = element.querySelector('svg');
                    if (svg) {
                        const svgData = new XMLSerializer().serializeToString(svg);
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const img = new Image();

                        await new Promise((resolve) => {
                            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                            const url = URL.createObjectURL(svgBlob);
                            img.onload = () => {
                                canvas.width = img.width;
                                canvas.height = img.height;
                                ctx.drawImage(img, 0, 0);
                                URL.revokeObjectURL(url);
                                resolve();
                            };
                            img.src = url;
                        });

                        imageData = canvas.toDataURL('image/png').split(',')[1];
                    }
                }

                if (imageData) {
                    const filename = `barcode_${i + 1}_${item.value.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                    imagesFolder.file(filename, imageData, { base64: true });
                }
            }

            zip.generateAsync({ type: 'blob' }).then(content => {
                const date = new Date().toISOString().slice(0, 10);
                saveAs(content, `barcodes_${date}.zip`);
            });
        }

        // Export to Excel with images
        async function exportToExcel() {
            if (generatedData.length === 0) {
                alert('没有可导出的内容');
                return;
            }

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('条形码数据');

            // Set column widths
            worksheet.columns = [
                { key: 'no', header: '序号', width: 10 },
                { key: 'value', header: '数据内容', width: 25 },
                { key: 'type', header: '代码类型', width: 15 },
                { key: 'image', header: '条形码', width: 30 }
            ];

            // Style header row
            const headerRow = worksheet.getRow(1);
            headerRow.font = { bold: true, size: 12 };
            headerRow.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: 'FFE0E0E0' }
            };
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };
            headerRow.height = 25;

            // Add data and images
            const imageWidth = 150;
            const imageHeight = 80;

            for (let i = 0; i < generatedData.length; i++) {
                const item = generatedData[i];
                const elementId = `code-${item.id}`;
                const element = document.getElementById(elementId);

                const row = worksheet.addRow({
                    no: i + 1,
                    value: item.value,
                    type: settings.type === 'qr' ? 'QR Code' : settings.type.toUpperCase()
                });

                // Style data rows
                row.alignment = { vertical: 'middle', horizontal: 'center' };

                // Get image data
                let imageDataUrl;

                if (settings.type === 'qr') {
                    const canvas = element.querySelector('canvas');
                    if (canvas) {
                        imageDataUrl = canvas.toDataURL('image/png');
                    }
                } else {
                    const svg = element.querySelector('svg');
                    if (svg) {
                        imageDataUrl = await svgToPng(svg);
                    }
                }

                if (imageDataUrl) {
                    // Add image to workbook
                    const imageId = workbook.addImage({
                        base64: imageDataUrl.split(',')[1],
                        extension: 'png',
                    });

                    // Set row height for image
                    row.height = 100;

                    // Add image to cell
                    worksheet.addImage(imageId, {
                        tl: { col: 3, row: i + 1 },
                        ext: { width: imageWidth, height: imageHeight },
                        editAs: 'oneCell'
                    });
                }
            }

            // Set row heights for better display
            worksheet.getRow(1).height = 30;

            // Generate and save
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const date = new Date().toISOString().slice(0, 10);
            saveAs(blob, `barcode_data_${date}.xlsx`);
        }

        // Convert SVG to PNG data URL
        function svgToPng(svg) {
            return new Promise((resolve) => {
                const svgData = new XMLSerializer().serializeToString(svg);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                // Get SVG dimensions
                const svgWidth = svg.getAttribute('width') || 200;
                const svgHeight = svg.getAttribute('height') || 100;
                canvas.width = parseInt(svgWidth) + 20;
                canvas.height = parseInt(svgHeight) + 20;

                img.onload = () => {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 10, 10);
                    resolve(canvas.toDataURL('image/png'));
                };

                img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
            });
        }
    </script>
</body>
